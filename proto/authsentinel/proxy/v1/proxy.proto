syntax = "proto3";

package authsentinel.proxy.v1;

option go_package = "github.com/ArmanAvanesyan/authsentinel/proto/gen/go/authsentinel/proxy/v1;proxyv1";

message EvaluateRequest {}
message EvaluateResponse {}

service ProxyService {
  rpc Evaluate(EvaluateRequest) returns (EvaluateResponse);
}

