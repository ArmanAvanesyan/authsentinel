# Build and push authsentinel-agent and authsentinel-proxy to GHCR.
name: Docker build and push

on:
  pull_request:
    paths:
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "proto/**"
      - "deployments/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    tags: ["v*"]
    paths:
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "proto/**"
      - "deployments/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - "cmd/**"
              - "internal/**"
              - "pkg/**"
              - "proto/**"
              - "deployments/**"
              - "go.mod"
              - "go.sum"
              - ".github/workflows/**"

  quality:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -short

      - name: Coverage
        run: go test ./... -count=1 -short -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-out
          path: coverage.out
          if-no-files-found: ignore

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Proto lint
        if: hashFiles('proto/**/*.proto') != ''
        run: buf lint proto

      - name: Proto breaking check (against main)
        if: hashFiles('proto/**/*.proto') != '' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' && !startsWith(github.ref, 'refs/tags/v')
        run: buf breaking proto --against '.git#branch=main'

  build:
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        service: [agent, proxy]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/authsentinel-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and Push (authsentinel-${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
