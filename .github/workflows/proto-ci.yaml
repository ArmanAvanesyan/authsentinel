name: Proto CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
      - name: Buf lint
        run: buf lint proto
      - name: Buf breaking (against main)
        if: github.event_name == 'pull_request'
        run: buf breaking proto --against '.git#branch=main'

