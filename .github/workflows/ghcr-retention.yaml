# Cleanup old GHCR container images for this repo.
# Docker build pushes: authsentinel-agent, authsentinel-proxy.

name: GHCR retention

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [authsentinel-agent, authsentinel-proxy]
    steps:
      - name: Delete old container image versions
        uses: actions/delete-package-versions@v5
        with:
          owner: ${{ github.repository_owner }}
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: false
