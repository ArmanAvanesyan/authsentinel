# AuthSentinel Agent — prod variant (HTTPS, strict cookie, minimal redirects).
# Use: CONFIG_PATH=configs/agent.prod.yaml or AGENT_CONFIG=configs/agent.prod.yaml
# Override oidc_*, redis_url, cookie_signing_secret, app_base_url via env in production.

oidc_issuer: "https://idp.example.com"
oidc_redirect_uri: "https://portal.example.com/callback"
oidc_client_id: "your-client-id"
oidc_client_secret: "your-client-secret"
oidc_scopes: ["openid", "profile"]
oidc_audience: ""
oidc_claims_source: "id_token"
redis_url: "redis://localhost:6379"
session_redis_prefix: "auth"
session_ttl_seconds: 28800
session_pkce_ttl_seconds: 300
session_refresh_lock_ttl_seconds: 15
session_refresh_early_seconds: 120
cookie_name: "__Host-ess_session"
cookie_signing_secret: "CHANGE-ME-in-production"
cookie_secure: true
cookie_same_site: "lax"
cookie_domain: ".example.com"
app_base_url: "https://portal.example.com"
login_error_redirect_path: "/login?error=oidc_error"
allowed_redirect_origins: []
allowed_redirect_paths: ["/"]
http_port: "8080"
post_login_webhook_url: ""
session_enrichment_api: ""
cors_allowed_origins: []
